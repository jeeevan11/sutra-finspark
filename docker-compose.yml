services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      SUTRA_SEED: ${SUTRA_SEED:-42}
      SUTRA_BUS: ${SUTRA_BUS:-redis}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SUTRA_DATA_DIR: /app/data
      SUTRA_DELIVERABLES_DIR: /app/deliverables
    volumes:
      - backend-data:/app/data
      - ./deliverables:/app/deliverables:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-http://localhost:8000}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1, not localhost: busybox wget tries ::1 first and the Next
      # standalone server only binds IPv4 — localhost probes always fail.
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  backend-data:
